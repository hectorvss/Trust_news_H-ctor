name: Pipeline — Ingest + Embed

# Replaces disabled Supabase crons: trust-news-ingest (*/15) + trust-news-embed (*/5)
on:
  schedule:
    - cron: '*/15 * * * *'   # Ingest every 15 min
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  ingest:
    name: Ingest RSS feeds
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger ingest-rss
        run: |
          echo "→ Triggering ingest-rss at $(date -u)"
          STATUS=$(curl -s -o /tmp/ingest_response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ingest-rss" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/ingest_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/ingest_response.json
          STATUS="$STATUS" python3 - <<'PY'
import json, os, sys
status = int(os.environ["STATUS"])
if status < 200 or status >= 300:
    sys.exit(1)
try:
    with open("/tmp/ingest_response.json", "r", encoding="utf-8") as fh:
        body = json.load(fh)
except Exception:
    sys.exit(0)
if body.get("ok") is False:
    sys.exit(1)
PY

  extract:
    name: Extract article content
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: ingest
    steps:
      - name: Trigger extract-article-content
        run: |
          echo "→ Triggering extract-article-content at $(date -u)"
          STATUS=$(curl -s -o /tmp/extract_response.json -w "%{http_code}" \
            --max-time 120 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/extract-article-content" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/extract_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/extract_response.json
          STATUS="$STATUS" python3 - <<'PY'
import json, os, sys
status = int(os.environ["STATUS"])
if status < 200 or status >= 300:
    sys.exit(1)
try:
    with open("/tmp/extract_response.json", "r", encoding="utf-8") as fh:
        body = json.load(fh)
except Exception:
    sys.exit(0)
if body.get("ok") is False:
    sys.exit(1)
PY

  embed:
    name: Generate embeddings
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: extract
    steps:
      - name: Trigger embed-articles
        run: |
          echo "→ Triggering embed-articles at $(date -u)"
          STATUS=$(curl -s -o /tmp/embed_response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/embed-articles" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/embed_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/embed_response.json
          STATUS="$STATUS" python3 - <<'PY'
import json, os, sys
status = int(os.environ["STATUS"])
if status < 200 or status >= 300:
    sys.exit(1)
try:
    with open("/tmp/embed_response.json", "r", encoding="utf-8") as fh:
        body = json.load(fh)
except Exception:
    sys.exit(0)
if body.get("ok") is False:
    sys.exit(1)
PY
