name: Pipeline — Cluster + Materialize

# Replaces disabled Supabase crons:
# trust-news-cluster (*/30), trust-news-materialize (*/45)
on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 min
  workflow_dispatch:

jobs:
  vector-cluster:
    name: Cluster by vector similarity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger cluster-articles
        run: |
          echo "→ Triggering cluster-articles at $(date -u)"
          STATUS=$(curl -s -o /tmp/cluster_response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/cluster-articles" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/cluster_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/cluster_response.json
          STATUS="$STATUS" python3 - <<'PY'
import json, os, sys
status = int(os.environ["STATUS"])
if status < 200 or status >= 300:
    sys.exit(1)
try:
    with open("/tmp/cluster_response.json", "r", encoding="utf-8") as fh:
        body = json.load(fh)
except Exception:
    sys.exit(0)
if body.get("ok") is False:
    sys.exit(1)
PY

  materialize:
    name: Materialize clusters to stories
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: vector-cluster
    steps:
      - name: Trigger materialize-cluster
        run: |
          echo "→ Triggering materialize-cluster at $(date -u)"
          STATUS=$(curl -s -o /tmp/mat_response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/materialize-cluster" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/mat_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/mat_response.json
          STATUS="$STATUS" python3 - <<'PY'
import json, os, sys
status = int(os.environ["STATUS"])
if status < 200 or status >= 300:
    sys.exit(1)
try:
    with open("/tmp/mat_response.json", "r", encoding="utf-8") as fh:
        body = json.load(fh)
except Exception:
    sys.exit(0)
if body.get("ok") is False:
    sys.exit(1)
PY
